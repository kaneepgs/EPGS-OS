<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EP Intelligence — CFO Executive Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-card">
          <div class="eyebrow">EP Intelligence</div>
          <h1>CFO Executive Workspace</h1>
          <p>Premium decision support for EP Golf Studios — calm, evidence-based, approval-first.</p>
        </div>

        <nav class="nav-group" id="primary-nav"></nav>
        <nav class="nav-group secondary" id="secondary-nav"></nav>

        <div class="sidebar-footer">
          <span class="status-dot"></span>
          Demo intelligence environment only. No APIs, no automation, no live financial systems.
        </div>
      </aside>

      <div class="main-column">
        <header class="topbar">
          <div>
            <div class="breadcrumb" id="breadcrumb"></div>
            <h2 id="page-title"></h2>
            <p id="page-subtitle"></p>
          </div>

          <div class="topbar-actions">
            <div class="mode-switcher" id="mode-switcher"></div>
          </div>
        </header>

        <main class="page-stage">
          <section class="page-transition" id="page-content"></section>
        </main>
      </div>
    </div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
